version: "3.9"

services:
  # ── Primary Data Store ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: typeahead-postgres
    environment:
      POSTGRES_DB: typeahead
      POSTGRES_USER: typeahead
      POSTGRES_PASSWORD: typeahead_secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U typeahead"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Distributed Cache: 3 Redis Nodes ────────────────────────────────────────
  redis-node-1:
    image: redis:7-alpine
    container_name: typeahead-redis-1
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-node-2:
    image: redis:7-alpine
    container_name: typeahead-redis-2
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-node-3:
    image: redis:7-alpine
    container_name: typeahead-redis-3
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Web Service ──────────────────────────────────────────────────────
  web:
    build: .
    container_name: typeahead-web
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: typeahead
      DB_USER: typeahead
      DB_PASSWORD: typeahead_secret
      REDIS_NODE_1: redis-node-1:6379
      REDIS_NODE_2: redis-node-2:6379
      REDIS_NODE_3: redis-node-3:6379
      CACHE_TTL: 300
      BATCH_MAX_SIZE: 500
      BATCH_FLUSH_INTERVAL: 5
      DECAY_LAMBDA: 0.0001
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis-node-1:
        condition: service_healthy
      redis-node-2:
        condition: service_healthy
      redis-node-3:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pg_data:
